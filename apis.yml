aid: national-cancer-institute
name: National Cancer Institute
description: >-
  The National Cancer Institute (NCI) is the federal government's principal
  agency for cancer research and training, part of the National Institutes of
  Health. NCI provides data and APIs for cancer genomics, clinical trials, and
  drug information.
