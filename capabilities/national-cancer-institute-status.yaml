naftiko: 1.0.0-alpha2
info:
  label: NCI Genomic Data Commons (GDC) API — Status
  description: 'NCI Genomic Data Commons (GDC) API — Status. 1 operations. Lead operation: Get API status. Self-contained
    Naftiko capability covering one National Cancer Institute business surface.'
  tags:
  - National Cancer Institute
  - Status
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    NATIONAL_CANCER_INSTITUTE_API_KEY: NATIONAL_CANCER_INSTITUTE_API_KEY
capability:
  consumes:
  - type: http
    namespace: national-cancer-institute-status
    baseUri: https://api.gdc.cancer.gov
    description: NCI Genomic Data Commons (GDC) API — Status business capability. Self-contained, no shared references.
    resources:
    - name: status
      path: /status
      operations:
      - name: getstatus
        method: GET
        description: Get API status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: X-Auth-Token
      value: '{{env.NATIONAL_CANCER_INSTITUTE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: national-cancer-institute-status-rest
    port: 8080
    description: REST adapter for NCI Genomic Data Commons (GDC) API — Status. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/status
      name: status
      description: REST surface for status.
      operations:
      - method: GET
        name: getstatus
        description: Get API status
        call: national-cancer-institute-status.getstatus
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: national-cancer-institute-status-mcp
    port: 9090
    transport: http
    description: MCP adapter for NCI Genomic Data Commons (GDC) API — Status. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: get-api-status
      description: Get API status
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: national-cancer-institute-status.getstatus
      outputParameters:
      - type: object
        mapping: $.
